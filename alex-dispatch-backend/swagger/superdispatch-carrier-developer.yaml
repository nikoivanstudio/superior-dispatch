components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    CarrierId:
      name: carrierId
      in: path
      required: true
      schema:
        type: integer
    IdPath:
      name: id
      in: path
      required: true
      schema:
        type: integer
    VehicleIdPath:
      name: vehicle_id
      in: path
      required: true
      schema:
        type: integer
    OrderIdPath:
      name: order_id
      in: path
      required: true
      schema:
        type: integer
    StepPath:
      name: step
      in: path
      required: true
      schema:
        type: string
        enum: [pickup, delivery]

  responses:
    SingleResponse:
      description: Standard single-item response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/SingleResponse'
    CollectionResponse:
      description: Standard collection response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/CollectionResponse'
    DeletedResponse:
      description: Standard deleted response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/DeletedResponse'
    ErrorResponse:
      description: Error response
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    Meta:
      type: object
      required: [code, request_id]
      properties:
        code:
          type: integer
        request_id:
          type: string

    ObjectPayload:
      type: object
      additionalProperties: true

    AuthTokenResponse:
      type: object
      required: [access_token, token_type, expires_in]
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        scope:
          type: string

    SingleResponse:
      type: object
      required: [meta]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          oneOf:
            - $ref: '#/components/schemas/ObjectPayload'
            - type: string

    CollectionResponse:
      type: object
      required: [meta, data]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        data:
          type: array
          items:
            $ref: '#/components/schemas/ObjectPayload'
        pagination:
          type: object
          properties:
            previous:
              type: string
              nullable: true
            next:
              type: string
              nullable: true

    DeletedResponse:
      type: object
      required: [meta]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'

    ErrorResponse:
      type: object
      required: [meta]
      properties:
        meta:
          $ref: '#/components/schemas/Meta'
        errors:
          type: array
          items:
            type: object
            properties:
              source:
                type: string
              detail:
                type: string
