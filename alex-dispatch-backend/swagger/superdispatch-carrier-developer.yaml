openapi: 3.0.3
info:
  title: Super Dispatch Carrier API (Developer Portal)
  version: 2026-03-29
  description: |
    Swagger/OpenAPI spec compiled from:
    https://developer.superdispatch.com/carrier/reference/
servers:
  - url: https://carrier.superdispatch.com
    description: Production
security:
  - bearerAuth: []
tags:
  - name: Auth
  - name: Drivers
  - name: Orders
  - name: Attachments
  - name: Vehicles
  - name: Expenses
  - name: Invoices
  - name: Offers
  - name: Inspection Photos
  - name: Damages
  - name: Inspections
  - name: Signatures

paths:
  /v1/oauth/token/:
    post:
      tags: [Auth]
      summary: Get access token
      security: []
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required: [grant_type, client_id, client_secret]
              properties:
                grant_type:
                  type: string
                  enum: [client_credentials]
                client_id:
                  type: string
                client_secret:
                  type: string
      responses:
        '200':
          description: Token response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthTokenResponse'

  /v1/carriers/{carrierId}/drivers/:
    post:
      tags: [Drivers]
      summary: Invite driver
      parameters:
        - $ref: '#/components/parameters/CarrierId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectPayload'
      responses:
        '201':
          $ref: '#/components/responses/SingleResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/drivers/:
    get:
      tags: [Drivers]
      summary: List drivers
      responses:
        '200':
          $ref: '#/components/responses/CollectionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/drivers/{id}/:
    get:
      tags: [Drivers]
      summary: Get a driver
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SingleResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    put:
      tags: [Drivers]
      summary: Update a driver
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectPayload'
      responses:
        '200':
          $ref: '#/components/responses/SingleResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    patch:
      tags: [Drivers]
      summary: Update a driver (partial)
      parameters:
        - $ref: '#/components/parameters/IdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectPayload'
      responses:
        '200':
          $ref: '#/components/responses/SingleResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/drivers/{id}/location/:
    get:
      tags: [Drivers]
      summary: Get driver location
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
          $ref: '#/components/responses/SingleResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/orders/:
    get:
      tags: [Orders]
      summary: List orders
      parameters:
        - name: per_page
          in: query
          schema:
            type: integer
            maximum: 100
        - name: page
          in: query
          schema:
            type: integer
        - name: status
          in: query
          schema:
            type: string
            enum: [unassigned, assigned, picked_up, in_transit, delivered, archived, billed, paid]
      responses:
        '200':
          $ref: '#/components/responses/CollectionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Orders]
      summary: Create an order
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectPayload'
      responses:
        '201':
          $ref: '#/components/responses/SingleResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/orders/{id}/:
    get:
      tags: [Orders]
      summary: Get an order
      parameters:
