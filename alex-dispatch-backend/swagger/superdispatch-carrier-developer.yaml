      summary: Receive signatures by step
      parameters:
        - $ref: '#/components/parameters/OrderIdPath'
        - $ref: '#/components/parameters/StepPath'
      responses:
        '200':
          $ref: '#/components/responses/CollectionResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    post:
      tags: [Signatures]
      summary: Send signature
      parameters:
        - $ref: '#/components/parameters/OrderIdPath'
        - $ref: '#/components/parameters/StepPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ObjectPayload'
      responses:
        '201':
          $ref: '#/components/responses/SingleResponse'
        default:
