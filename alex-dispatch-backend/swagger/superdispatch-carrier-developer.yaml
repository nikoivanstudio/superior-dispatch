    delete:
      tags: [Orders]
      summary: Delete an order
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '204':
          $ref: '#/components/responses/DeletedResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'

  /v1/orders/{id}/picked-up/:
