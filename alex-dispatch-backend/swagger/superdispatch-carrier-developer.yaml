      responses:
        '201':
          $ref: '#/components/responses/SingleResponse'
        default:
          $ref: '#/components/responses/ErrorResponse'
    get:
      tags: [Attachments]
      summary: List attachments
      parameters:
        - $ref: '#/components/parameters/IdPath'
      responses:
        '200':
